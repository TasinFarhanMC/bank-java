name: Java Multi-Platform Build with jpackage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle.lockfile') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Build JAR
        run: ./gradlew clean jar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.os }}
          path: build/libs/*.jar

      - name: Run jpackage task
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            ./gradlew jpackageLinux --no-daemon
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ./gradlew jpackageWindows --no-daemon
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            ./gradlew jpackageMac --no-daemon
          fi

      - name: Upload jpackage artifact
        uses: actions/upload-artifact@v4
        with:
          name: jpackage-${{ matrix.os }}
          path: build/jpackage/${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'windows-latest' && 'windows' || matrix.os == 'macos-latest' && 'macos' }}/

